name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much of the form below as possible.

  - type: input
    id: version
    attributes:
      label: codebase-index version
      description: What version of codebase-index are you running?
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      description: What Python version are you using?
      placeholder: "3.12.3"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      description: What OS and version are you using?
      placeholder: "macOS 14.4, Ubuntu 24.04, Windows 11"
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug and what you expected to happen.
      placeholder: |
        1. Ran `codebase-index index` on my project
        2. Expected: index completes successfully
        3. Actual: got error "..."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Provide minimal steps to reproduce the issue.
      placeholder: |
        1. `codebase-index init`
        2. `codebase-index index`
        3. `codebase-index search "query"`
        4. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste any relevant terminal output or error messages.
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add any other context, screenshots, or configuration details.
