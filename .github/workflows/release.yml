name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:   # manual (re)publish — e.g. push an already-tagged version to PyPI

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev,build]"
      - name: Test gate
        run: pytest
      - name: Build
        run: python -m build
      - name: Check
        run: twine check dist/*
      - name: Clean-machine smoke
        run: python scripts/release_smoke.py
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  github-release:
    needs: build
    # Only when a tag was pushed — a manual workflow_dispatch run publishes to
    # PyPI without recreating the GitHub release for an existing tag.
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the GitHub release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  pypi-publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # OIDC for PyPI Trusted Publishing — no token stored anywhere
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
